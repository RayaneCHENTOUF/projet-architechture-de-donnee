version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: urban_data_mysql
    environment:
      MYSQL_ROOT_PASSWORD: dbl2025
      MYSQL_DATABASE: urban_data
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: urban_data_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
