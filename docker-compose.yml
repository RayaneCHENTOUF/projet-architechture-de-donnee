services:
  mysql:
    image: mysql:8.0
    container_name: urban_data_mysql
    environment:
      MYSQL_ROOT_PASSWORD: dbl2025
      MYSQL_DATABASE: urban_data
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --local-infile=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdbl2025"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: urban_data_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  seeder:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: urban_data_seeder
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: urban_data
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: urban_data
      MYSQL_USER: root
      MYSQL_PASSWORD: dbl2025
    volumes:
      - ./data:/app/data
      - ./sql:/app/sql
      - ./src/pipeline:/app/src/pipeline
    command: python /app/src/pipeline/export/seed_docker.py
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: urban_data_backend
    environment:
      API_KEY: ${API_KEY}
      FRONT_URL: http://localhost
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: urban_data
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: urban_data
      MYSQL_USER: root
      MYSQL_PASSWORD: dbl2025
    ports:
      - "8000:8000"
    depends_on:
      seeder:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./Front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_API_KEY: ${API_KEY}
    container_name: urban_data_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
